<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes aaPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .3; transform: scale(2.6); } }
  @keyframes aaRec { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
</style>
</helmet>
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px; background: radial-gradient(130% 130% at 50% 0%, #24140c 0%, #0a0a0c 62%); font-family: 'Barlow', system-ui, sans-serif;">
  <div style="{{ frameStyle }}">

    <!-- ===== LEFT NAV RAIL (car launcher) ===== -->
    <div style="width: 88px; flex: 0 0 auto; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 10px;">
      <div style="width: 48px; height: 48px; border-radius: 14px; background: var(--panel2); display: flex; align-items: center; justify-content: center; margin-bottom: 6px;">
        <svg width="30" height="30" viewBox="0 0 512 512">
          <path d="M128 372 C 176 300, 150 232, 214 236 C 278 240, 250 152, 320 150 C 356 149, 372 168, 388 150" fill="none" stroke="var(--accent)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="128" cy="372" r="24" fill="var(--panel2)" stroke="var(--accent)" stroke-width="20"/>
          <circle cx="388" cy="150" r="40" fill="var(--accent)"/>
        </svg>
      </div>
      <div style="width: 56px; height: 56px; border-radius: 16px; background: color-mix(in srgb, var(--accent) 18%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="6" fill="var(--accent)"/></svg>
        <span style="font-size: 9px; font-weight: 700; color: var(--accent);">REC</span>
      </div>
      <button style="width: 56px; height: 56px; border-radius: 16px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dim);">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M9 4l6 2 6-2v14l-6 2-6-2-6 2V6l6-2zm0 0v14m6-12v14" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </button>
      <button style="width: 56px; height: 56px; border-radius: 16px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dim);">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M5 19c3-1 3-9 7-9s4 6 7 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="5" cy="19" r="2" fill="currentColor"/><circle cx="19" cy="15" r="2" fill="currentColor"/></svg>
      </button>
      <div style="flex: 1;"></div>
      <button style="width: 56px; height: 56px; border-radius: 16px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--dim);">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 7h10M18 7h2M4 17h2M10 17h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="7" r="2.4" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="17" r="2.4" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>

    <!-- ===== MAIN ===== -->
    <div style="flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; position: relative;">

      <!-- TOP STATUS STRIP -->
      <div style="height: 58px; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 22px; border-bottom: 1px solid var(--line);">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div style="display: flex; align-items: center; gap: 9px; padding: 7px 13px; border-radius: 999px; background: var(--panel); border: 1px solid var(--line);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="17" r="3" stroke="var(--accent)" stroke-width="2"/><circle cx="18" cy="17" r="3" stroke="var(--accent)" stroke-width="2"/><path d="M6 17l3-7h4l4 7M9 10V7h3" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/></svg>
            <span style="font-weight: 600; font-size: 15px;">Yamaha Ténéré 700</span>
          </div>
          <div style="display: flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 999px; background: var(--panel); border: 1px solid var(--line);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2v20M12 2l5 4-5 4M12 22l-5-4 5-4" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--dim);">BT</span>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase;">Android Auto</span>
          <div style="width: 1px; height: 20px; background: var(--line);"></div>
          <div style="display: flex; align-items: center; gap: 7px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="var(--accent2)" stroke-width="2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round"/></svg>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500;">{{ tempStr }}</span>
          </div>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500;">9:41</span>
        </div>
      </div>

      <!-- CONTENT: MAP + DATA -->
      <div style="flex: 1 1 auto; display: flex; padding: 18px; gap: 18px; min-height: 0;">

        <!-- MAP -->
        <div style="flex: 1.55 1 0; position: relative; border-radius: 22px; overflow: hidden; background: var(--panel); background-image: var(--grid); background-size: 34px 34px; border: 1px solid var(--line);">
          <svg viewBox="0 0 700 500" preserveAspectRatio="xMidYMid slice" style="position: absolute; inset: 0; width: 100%; height: 100%;">
            <path d="M60 430 C 200 380, 150 250, 300 260 C 460 270, 420 110, 560 120 C 640 126, 660 200, 690 150" fill="none" stroke="var(--line)" stroke-width="22" stroke-linecap="round"/>
            <path d="M60 430 C 200 380, 150 250, 300 260 C 460 270, 420 110, 560 120 C 640 126, 660 200, 690 150" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" style="{{ recPathStyle }}"/>
            <circle cx="60" cy="430" r="11" fill="var(--accent)"/>
          </svg>
          <!-- current position -->
          <div style="position: absolute; left: 46%; top: 50%; transform: translate(-50%,-50%);">
            <div style="position: relative; width: 26px; height: 26px;">
              <div style="position: absolute; inset: 0; border-radius: 50%; background: var(--accent); border: 3px solid var(--panel);"></div>
              <sc-if value="{{ recording }}" hint-placeholder-val="{{ true }}">
                <div style="position: absolute; inset: 0; border-radius: 50%; background: var(--accent); animation: aaPulse 1.8s ease-out infinite;"></div>
              </sc-if>
            </div>
          </div>
          <!-- route label -->
          <div style="position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 9px; padding: 8px 14px; border-radius: 999px; background: color-mix(in srgb, var(--bg) 74%, transparent); backdrop-filter: blur(6px); border: 1px solid var(--line);">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="10" r="3" stroke="var(--accent)" stroke-width="2"/><path d="M12 21c5-6 7-9 7-12a7 7 0 10-14 0c0 3 2 6 7 12z" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/></svg>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--dim);">GPS · 12 sat · {{ onRoadLbl }}</span>
            </div>
            <div style="display: inline-flex; align-self: flex-start; padding: 7px 14px; border-radius: 999px; background: color-mix(in srgb, var(--bg) 74%, transparent); backdrop-filter: blur(6px); border: 1px solid var(--line); font-family: 'Barlow Semi Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: .5px; text-transform: uppercase;">{{ areaLbl }}</div>
          </div>

          <!-- weather chip -->
          <div style="position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 9px; padding: 8px 15px; border-radius: 999px; background: color-mix(in srgb, var(--bg) 74%, transparent); backdrop-filter: blur(6px); border: 1px solid var(--line);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="var(--accent2)" stroke-width="2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M6 6l1.5 1.5M18 18l-1.5-1.5M6 18l1.5-1.5M18 6l-1.5 1.5" stroke="var(--accent2)" stroke-width="2" stroke-linecap="round"/></svg>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500;">{{ wxStr }}</span>
          </div>
          <!-- compass -->
          <div style="position: absolute; bottom: 16px; right: 16px; width: 78px; height: 78px; border-radius: 50%; background: color-mix(in srgb, var(--bg) 78%, transparent); backdrop-filter: blur(6px); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;">
            <svg width="56" height="56" viewBox="0 0 60 60">
              <text x="30" y="13" text-anchor="middle" font-size="9" font-family="'JetBrains Mono', monospace" fill="var(--dim)">N</text>
              <g style="{{ compassStyle }}" transform-origin="30 30"><polygon points="30,13 24,32 36,32" fill="var(--accent2)"/><polygon points="30,47 24,32 36,32" fill="var(--dim)"/></g>
              <circle cx="30" cy="30" r="3" fill="var(--text)"/>
            </svg>
            <span style="position: absolute; bottom: 4px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent2);">{{ cardinal }}</span>
          </div>
        </div>

        <!-- DATA COLUMN -->
        <div style="flex: 0 0 430px; display: flex; flex-direction: column; gap: 14px;">
          <!-- speed -->
          <div style="background: var(--panel); border: 1px solid var(--line); border-radius: 22px; padding: 20px 24px;">
            <div style="font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); font-weight: 600;">Prędkość</div>
            <div style="display: flex; align-items: baseline; gap: 10px;">
              <span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 96px; line-height: 1; letter-spacing: -3px; color: var(--accent);">{{ spdStr }}</span>
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--dim);">km/h</span>
            </div>
            <div style="height: 8px; border-radius: 4px; background: var(--panel2); margin-top: 12px; overflow: hidden;"><div style="{{ meterStyle }}"></div></div>
          </div>

          <!-- time / distance -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
            <div style="background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 16px 18px;">
              <div style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-weight: 600;">Czas</div>
              <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 34px; margin-top: 4px;">{{ elapsedStr }}</div>
            </div>
            <div style="background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 16px 18px;">
              <div style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-weight: 600;">Dystans</div>
              <div style="display: flex; align-items: baseline; gap: 6px; margin-top: 4px;"><span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 34px;">{{ distStr }}</span><span style="color: var(--dim); font-size: 15px;">km</span></div>
            </div>
          </div>

          <!-- lean / altitude -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
            <div style="background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 16px 18px; display: flex; align-items: center; gap: 14px;">
              <div style="flex: 1;">
                <div style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-weight: 600;">Pochylenie</div>
                <div style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px; margin-top: 4px;">{{ leanStr }}°</div>
              </div>
              <div style="width: 52px; height: 34px; display: flex; align-items: center; justify-content: center; overflow: hidden;"><div style="width: 48px; height: 3px; background: var(--accent2); border-radius: 2px; {{ leanBarStyle }}"></div></div>
            </div>
            <div style="background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 16px 18px;">
              <div style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); font-weight: 600;">Wysokość</div>
              <div style="display: flex; align-items: baseline; gap: 6px; margin-top: 4px;"><span style="font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px;">{{ elevStr }}</span><span style="color: var(--dim); font-size: 14px;">m</span></div>
            </div>
          </div>

          <div style="flex: 1 1 auto; min-height: 8px;"></div>

          <!-- BIG CONTROL -->
          <sc-if value="{{ idle }}" hint-placeholder-val="{{ false }}">
            <button onClick="{{ startRec }}" style="width: 100%; height: 96px; border: none; border-radius: 22px; background: var(--accent); color: #05100e; font-weight: 700; font-size: 26px; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 14px; font-family: 'Barlow Semi Condensed', sans-serif;">
              <span style="width: 20px; height: 20px; border-radius: 50%; background: #05100e;"></span> Rozpocznij trasę
            </button>
          </sc-if>
          <sc-if value="{{ recording }}" hint-placeholder-val="{{ true }}">
            <div style="display: flex; gap: 14px;">
              <sc-if value="{{ running }}" hint-placeholder-val="{{ true }}">
                <button onClick="{{ pauseRec }}" style="flex: 1; height: 96px; border: 1px solid var(--line); border-radius: 22px; background: var(--panel); color: var(--text); font-weight: 700; font-size: 24px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: 'Barlow Semi Condensed', sans-serif;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor"/><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor"/></svg> Pauza
                </button>
              </sc-if>
              <sc-if value="{{ paused }}" hint-placeholder-val="{{ false }}">
                <button onClick="{{ resumeRec }}" style="flex: 1; height: 96px; border: none; border-radius: 22px; background: var(--accent); color: #05100e; font-weight: 700; font-size: 24px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-family: 'Barlow Semi Condensed', sans-serif;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 5l12 7-12 7V5z" fill="currentColor"/></svg> Wznów
                </button>
              </sc-if>
              <button onClick="{{ stopRec }}" style="flex: 0 0 130px; height: 96px; border: none; border-radius: 22px; background: var(--accent2); color: #1a0a05; font-weight: 700; font-size: 24px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Semi Condensed', sans-serif;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
              </button>
            </div>
          </sc-if>
        </div>
      </div>

    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:700},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;night&quot;,&quot;options&quot;:[&quot;night&quot;,&quot;day&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Wygląd&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#00d1b2&quot;,&quot;options&quot;:[&quot;#00d1b2&quot;,&quot;#ff5c38&quot;,&quot;#c6ff00&quot;,&quot;#3b82f6&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Wygląd&quot;}}">
class Component extends DCLogic {
  state = {
    recording: false, paused: false, t: 0, dist: 0, spd: 0, lean: 0, elev: 512, weather: { temp: 21, hum: 64 },
  };

  componentDidMount() {
    this.timer = setInterval(() => {
      if (this.state.recording && !this.state.paused) {
        this.setState(s => {
          const t = s.t + 1;
          const spd = Math.max(0, Math.round(52 + 32 * Math.sin(t / 7) + 9 * Math.sin(t / 2.3)));
          const dist = s.dist + spd / 3600;
          const lean = Math.round(Math.abs(36 * Math.sin(t / 5)) + 3);
          const elev = Math.round(460 + 240 * (0.5 + 0.5 * Math.sin(t / 11)));
          return { t, spd, dist, lean, elev };
        });
      }
    }, 1000);
  }
  componentWillUnmount() { clearInterval(this.timer); }

  fmtT(sec) {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    const p = n => String(n).padStart(2, '0');
    return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
  }

  renderVals() {
    const st = this.state;
    const theme = this.props.theme || 'night';
    const THEMES = {
      night: { bg: '#0a0c0e', panel: '#14181c', panel2: '#1e232a', line: 'rgba(255,255,255,0.08)', text: '#f1f4f3', dim: '#8a928c', accent2: '#ff5c38', grid: 'none' },
      day: { bg: '#e9eeec', panel: '#ffffff', panel2: '#eef3f0', line: 'rgba(0,0,0,0.10)', text: '#111819', dim: '#5c6660', accent2: '#e2542e', grid: 'none' },
    };
    const th = THEMES[theme] || THEMES.night;
    const accent = this.props.accent || '#00d1b2';

    const frameStyle = {
      '--bg': th.bg, '--panel': th.panel, '--panel2': th.panel2, '--line': th.line,
      '--text': th.text, '--dim': th.dim, '--accent': accent, '--accent2': th.accent2, '--grid': th.grid,
      width: '1280px', height: '720px', flex: '0 0 auto',
      background: 'var(--bg)', color: 'var(--text)',
      borderRadius: '22px', border: '14px solid #050607',
      boxShadow: '0 50px 110px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.04)',
      display: 'flex', overflow: 'hidden',
      fontFamily: "'Barlow', system-ui, sans-serif",
    };

    const spd = st.spd;
    const meterStyle = { width: Math.min(100, (spd / 160) * 100) + '%', height: '100%', borderRadius: '4px', background: 'var(--accent)', transition: 'width .5s ease' };
    const leanBarStyle = `transform: rotate(${st.recording ? st.lean : 0}deg); transition: transform .5s ease;`;
    const recProgress = Math.min(1, st.t / 90);
    const recPathStyle = { strokeDasharray: 1200, strokeDashoffset: 1200 * (1 - (st.recording ? recProgress : 0.24)), transition: 'stroke-dashoffset 1s linear' };

    const heading = st.recording ? ((Math.round(48 + 40 * Math.sin(st.t / 12)) % 360) + 360) % 360 : 47;
    const CARD = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    const cardinal = CARD[Math.round(heading / 45) % 8];
    const compassStyle = `transform: rotate(${heading}deg); transition: transform .6s ease;`;

    return {
      frameStyle,
      recording: st.recording, idle: !st.recording, paused: st.paused, running: st.recording && !st.paused,
      spdStr: String(spd),
      elapsedStr: this.fmtT(st.t),
      distStr: st.dist.toFixed(1),
      leanStr: st.recording ? String(st.lean) : '0',
      elevStr: st.recording ? String(st.elev) : '—',
      tempStr: st.weather.temp + '°',
      wxStr: st.weather.temp + '° · ' + st.weather.hum + '%',
      onRoadLbl: 'na drodze',
      areaLbl: 'Beskid Sądecki',
      meterStyle, leanBarStyle, recPathStyle, heading, cardinal, compassStyle,
      startRec: () => this.setState({ recording: true, paused: false, t: 0, dist: 0, spd: 0, lean: 0, elev: 460 }),
      pauseRec: () => this.setState({ paused: true }),
      resumeRec: () => this.setState({ paused: false }),
      stopRec: () => this.setState({ recording: false, paused: false }),
    };
  }
}
</script>
</body>
</html>
