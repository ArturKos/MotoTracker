<!DOCTYPE html>
<html lang="en">
<head>
    <title>MotoTracker — Change password</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css?v=3" />
</head>
<body class="auth-body">
    <form id="pwForm" class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-key"></i>
            <span>Change password</span>
        </div>
        <label>
            Current password
            <input type="password" name="current_password" id="current_password" autocomplete="current-password">
            <small>Leave blank if you were asked to change on first login.</small>
        </label>
        <label>
            New password (min. 8 chars)
            <input type="password" name="new_password" id="new_password" autocomplete="new-password" minlength="8" required>
        </label>
        <label>
            Confirm new password
            <input type="password" id="new_password2" autocomplete="new-password" minlength="8" required>
        </label>
        <button type="submit" class="auth-submit">
            <i class="fas fa-check"></i> Change
        </button>
        <div id="authError" class="auth-error" style="display:none"></div>
    </form>

<script>
document.getElementById('pwForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var err = document.getElementById('authError');
    err.style.display = 'none';
    var np = document.getElementById('new_password').value;
    var np2 = document.getElementById('new_password2').value;
    if (np !== np2) {
        err.textContent = "New passwords don't match.";
        err.style.display = 'block';
        return;
    }
    var body = new URLSearchParams();
    body.append('current_password', document.getElementById('current_password').value);
    body.append('new_password', np);
    fetch('change_password.php', { method: 'POST', body: body, credentials: 'same-origin' })
        .then(function(r) { return r.json().then(function(j) { return { status: r.status, body: j }; }); })
        .then(function(res) {
            if (res.status === 401 && res.body.error === 'unauthorized') {
                window.location.href = 'login.html';
                return;
            }
            if (res.body.ok) {
                window.location.href = 'index.html';
            } else {
                err.textContent = 'Error: ' + (res.body.error || 'unknown');
                err.style.display = 'block';
            }
        })
        .catch(function() {
            err.textContent = 'Network error.';
            err.style.display = 'block';
        });
});
</script>
</body>
</html>
